[project]
name = "gnn-insider-threat"
version = "0.1.0"
description = "Deep Learning project for Insider Threat Detection using GCN and Bi-LSTM"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pandas",
    "numpy",
    "torch",
    "torch_geometric",
    "pytorch-lightning",
    "scikit-learn",
    "tqdm",
    "pyyaml",
    "requests",
    "matplotlib",
    "jupyter",
    "dvc[gdrive]",
    "psutil",
    "duckdb>=1.5.2",
    "pytest>=9.0.2",
    "pytest-mock>=3.15.1",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
]
experiment = [
    "wandb",
]

[project.scripts]
preprocess = "certgnn.preprocess:main"
download-data = "certgnn.download_data:download_dataset"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/certgnn"]
