# ---------------------------------------------------------------------------
# Filesystem layout and dataset download.
#
# All config files in configs/*.yaml are deep-merged by certgnn.utils.load_config
# into a single config dict, so top-level keys here (paths, download) sit next to
# `preprocessing` and `training` from the sibling files.
# ---------------------------------------------------------------------------
paths:
  raw_dir: "data/raw/cmu_cert_r5.2"
  processed_dir: "data/processed/r5.2"
  extract_dir: "data/raw/cmu_cert_r5.2/r5.2"

# CMU CERT dataset article on Figshare (used by `uv run download-data`).
download:
  article_id: "12841247"
  target_files:
    - "r5.2.tar.bz2"
    - "answers.tar.bz2"
