paths:
  raw_dir: "data/raw/cmu_cert_r5.2"
  processed_dir: "data/processed/r5.2"
  extract_dir: "data/raw/cmu_cert_r5.2/r5.2"

# CMU CERT Dataset Article ID on Figshare
download:
  article_id: "12841247"
  target_files:
    - "r5.2.tar.bz2"
    - "answers.tar.bz2"

preprocessing:
  frac_normal_users: 0.0085       # Fraction of normal users to include (0.0-1.0), 
  frac_malicious_users: 0.09      # Fraction of malicious users to sample (0.0-1.0), 99 total
  dataset_version: "5.2"
  min_session_size: 5             # Minimum activities per session/sub-session
  max_session_size: 50            # Maximum activities per sub-session before splitting
  keep_local: true               # Keep local .pt files after push to GDrive
  seed: 42
