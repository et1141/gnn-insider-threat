paths:
  raw_dir: "data/raw/cmu_cert_r5.2"
  processed_dir: "data/processed/r5.2"
  extract_dir: "data/raw/cmu_cert_r5.2/r5.2"

# CMU CERT Dataset Article ID on Figshare
download:
  article_id: "12841247"
  target_files:
    - "r5.2.tar.bz2"
    - "answers.tar.bz2"

# ---------------------------------------------------------------------------
# Preprocessing — pick a variant; settings live under their own subsection.
# Both variants share the DuckDB SQL feature pipeline and produce the same
# 54-dim node features. They differ in user selection and how train/val/test
# is materialised on disk.
# ---------------------------------------------------------------------------
preprocessing:
  variant: "user_level_split"           # paper_faithful | user_level_split

  paper_faithful:
    frac_normal_users: 0.0085         # Fraction of normal users (0.0-1.0)
    frac_malicious_users: 0.09        # Fraction of malicious users (99 total in r5.2)
    keep_local: true                  # Keep .pt files locally after `--stream` push

  user_level_split:
    num_normal_users: 15
    num_malicious_users: 90           # max 99 for r5.2
    balance_malicious_by_scenario: true
    strict_equal_scenarios: false
    val_ratio: 0.15
    test_ratio: 0.15

  common:
    dataset_version: "5.2"
    min_session_size: 5
    max_session_size: 50
    seed: 42

# ---------------------------------------------------------------------------
# Training — pick task + model + their args. The Lightning module monitors
# val/loss (min) for anomaly_aware and val/roc_auc (max) for binary; the
# callback factory picks the right mode for ModelCheckpoint/EarlyStopping.
# ---------------------------------------------------------------------------
training:
  task: "anomaly_aware"               # anomaly_aware | binary
  model: "graph_pool_mlp"                   # gcn_lstm | graph_pool_mlp
  seed: 42

  # Per-model kwargs forwarded to MODEL_REGISTRY[model](**kwargs); train.py
  # picks model_args[model]. input_dim / num_node_features /
  # num_activity_classes are auto-filled from metadata.pkl when omitted.
  model_args:
    gcn_lstm:
      gcn_hidden_dim: 16
      lstm_hidden_dim: 32
      lstm_num_layers: 2
    graph_pool_mlp:
      hidden_dim: 128
      dropout: 0.2
      pooling: "mean_max"
    gcn_transformer:
      d_model: 32
      nhead: 4
      transformer_num_layers: 2

  # Per-task kwargs forwarded to the Lightning task constructor; train.py
  # picks loss_args[task] so changing `task:` doesn't require also editing
  # the args here.
  loss_args:
    anomaly_aware:
      loss_type: "anomaly_aware"        # anomaly_aware | standard
      target_fpr: 0.05
    binary:
      gamma: 2.0
      pos_weight_clamp: 1000.0

  optimizer:
    name: "adam"                      # adam | adamw
    lr: 1.0e-3
    weight_decay: 1.0e-5

  scheduler:
    type: "plateau"                   # null to disable, or "plateau"
    factor: 0.5
    patience: 3
    min_lr: 1.0e-6

  data:
    batch_size: 128
    num_workers: 0
    max_local_chunks: null            # null = autodetect from RAM/accelerator
    persistent_workers: null
    prefetch_factor: null
    pin_memory: null
    accelerator: null                 # null = autodetect; otherwise gpu/mps/cpu

    # paper-faithful only: per-graph random split applied at training time
    val_size: 0.1
    test_size: 0.2
    sampler_seed: 42

  trainer:
    max_epochs: 30
    log_every_n_steps: 50
    accelerator: "auto"
    devices: "auto"
    precision: 32                     # 32 | "16-mixed" | "bf16-mixed"
    deterministic: true

  callbacks:
    patience: 5
    save_top_k: 3
    enable_gpu_metrics: true

  wandb:
    project: "gnn-insider-threat"
    entity: "adrian-walczak119-iiuwr" # null = default from wandb login / WANDB_ENTITY
    mode: "online"                   # offline | online | disabled
    run_name: gcn_transformer             # null lets wandb auto-name the run
